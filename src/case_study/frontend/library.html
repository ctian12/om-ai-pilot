<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library — CaseGen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="library.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <span class="wordmark">CaseGen</span>
      <nav class="header-nav">
        <a href="index.html" class="nav-link">Generator</a>
        <a href="library.html" class="nav-link active">Library</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="library-header">
      <h1>Library</h1>
      <a href="index.html" class="primary-btn" style="text-decoration:none;">+ New case study</a>
    </div>

    <div id="loading" class="loading-state">
      <div class="spinner"></div>
      <p>Loading saved case studies...</p>
    </div>

    <div id="empty-state" style="display:none;">
      <div class="empty-box">
        <p class="empty-title">No saved case studies yet</p>
        <p class="empty-desc">Generate a case study and save it — it'll appear here grouped by concept.</p>
        <a href="index.html" class="primary-btn" style="text-decoration:none;display:inline-flex;">Start generating</a>
      </div>
    </div>

    <div id="library-content" style="display:none;"></div>
  </main>

  <!-- RENAME MODAL -->
  <div id="modal-overlay" style="display:none;" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <h3>Rename case study</h3>
      <input type="text" id="rename-input" placeholder="Enter new title" />
      <div class="modal-actions">
        <button class="ghost-btn" onclick="closeModal()">Cancel</button>
        <button class="primary-btn" onclick="confirmRename()">Save</button>
      </div>
    </div>
  </div>

  <!-- VIEW MODAL -->
  <div id="view-overlay" style="display:none;" onclick="closeViewModal()">
    <div class="modal modal-large" onclick="event.stopPropagation()">
      <div class="view-modal-header">
        <div>
          <div class="cs-meta" id="view-meta"></div>
          <h2 id="view-title"></h2>
        </div>
        <div style="display:flex;gap:8px;align-items:flex-start;">
          <button class="ghost-btn" onclick="copyFromModal()">Copy</button>
          <button class="ghost-btn" onclick="closeViewModal()">✕</button>
        </div>
      </div>
      <div class="view-modal-body" id="view-body"></div>
    </div>
  </div>

  <script src="library.js"></script>
</body>
</html>
